<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoftN Labs · 권한 관리</title>
<link rel="stylesheet" href="./fonts/fontello/css/fontello.css">
<link rel="stylesheet" href="./labs.css">
<script>document.documentElement.setAttribute('data-mode', localStorage.getItem('labs_theme') || 'light');</script>
</head>
<body>

<div id="header-slot"></div>

<main class="container">
  <nav class="breadcrumb">
    <a href="labs.html">Labs</a><span class="sep">/</span><span class="cur">권한 관리</span>
  </nav>
  <h1 class="admin-title">권한 관리</h1>
  <p class="admin-desc">Labs 사용자에게 역할(비로그인·일반·운영)을 부여하거나 회수합니다. 이 화면과 변경 권한은 운영(Staff) 사용자에게만 허용됩니다.</p>

  <!-- 권한 없음 (Member 접근 시) -->
  <div class="admin-denied" id="admin-denied" hidden>
    <div class="ad-icon"><i class="icon-lock-filled"></i></div>
    <h2>운영 권한이 필요합니다</h2>
    <p>이 화면은 운영(Staff) 권한 사용자만 접근할 수 있습니다.</p>
  </div>

  <!-- 관리 콘텐츠 (Staff) -->
  <section class="admin-content" id="admin-content" hidden>
    <div class="admin-toolbar">
      <div class="search"><i class="icon-zoom-in"></i><input type="text" id="user-search" placeholder="닉네임·이메일로 검색" autocomplete="off"></div>
      <span class="admin-count" id="user-count"></span>
      <button class="btn primary" id="add-user-btn">+ 사용자 추가</button>
    </div>
    <div class="admin-table" id="user-table"></div>
  </section>
</main>

<!-- 사용자 추가 모달 -->
<div class="lab-modal-overlay" id="add-modal">
  <div class="lab-modal" role="dialog" aria-modal="true" aria-labelledby="am-title">
    <div class="lm-head"><h3 id="am-title">사용자 추가</h3><button class="lm-close" id="am-close" aria-label="닫기">×</button></div>
    <div class="lm-body">
      <div class="lm-field"><label for="am-nick">닉네임</label><input class="lm-input" type="text" id="am-nick" placeholder="닉네임" autocomplete="off"></div>
      <div class="lm-field"><label for="am-email">이메일</label><input class="lm-input" type="email" id="am-email" placeholder="name@quizn.app" autocomplete="off"></div>
      <div class="lm-field"><label for="am-pw">비밀번호</label><input class="lm-input" type="password" id="am-pw" placeholder="8자 이상 입력" autocomplete="new-password"></div>
      <div class="lm-field"><label for="am-pw2">비밀번호 확인</label><input class="lm-input" type="password" id="am-pw2" placeholder="비밀번호를 다시 입력" autocomplete="new-password"></div>
      <div class="lm-field"><label for="am-role">역할</label>
        <select class="lm-input" id="am-role"><option value="member">일반</option><option value="staff">운영</option></select>
      </div>
    </div>
    <div class="lm-foot">
      <button class="btn ghost" id="am-cancel">취소</button>
      <button class="btn primary" id="am-submit">추가</button>
    </div>
  </div>
</div>

<!-- 회원 삭제 확인 모달 -->
<div class="lab-modal-overlay" id="confirm-modal">
  <div class="lab-modal confirm-modal" role="dialog" aria-modal="true">
    <p class="confirm-msg" id="confirm-msg">회원이 삭제됩니다. 삭제하시겠습니까?</p>
    <div class="confirm-actions">
      <button class="btn ghost" id="confirm-cancel">취소</button>
      <button class="btn primary" id="confirm-ok">삭제</button>
    </div>
  </div>
</div>

<div id="footer-slot"></div>
<div id="gate-slot"></div>

<script src="./labs.js?v=20260618"></script>
<script>
  document.getElementById('header-slot').outerHTML = headerHTML();
  document.getElementById('gate-slot').outerHTML = gateHTML();
  injectFooter('footer-slot');

  const tableEl = document.getElementById('user-table');
  const searchEl = document.getElementById('user-search');
  const cell = (cls, text) => el('span', cls, text);
  const roleBadge = (role) => el('span', 'role-badge ' + role, ROLE_KO[role]);

  function dispNick(u, myNick) { return (u.me && myNick) ? myNick : u.nick; }   // 본인은 QuizN 닉네임 따라감

  function renderUsers() {
    const q = searchEl.value.trim().toLowerCase();
    const _acc = JSON.parse(localStorage.getItem('quizn_account') || 'null');
    const myNick = _acc && _acc.nick ? _acc.nick : null;
    const list = USERS.filter(function (u) {
      if (!q) return true;
      var hay = [dispNick(u, myNick), u.email];
      return hay.some(function (n) { return (n || '').toLowerCase().includes(q); });
    });
    tableEl.replaceChildren();
    const head = el('div', 'ut-row ut-head');
    head.append(cell('ut-user', '닉네임'), cell('ut-email', '이메일'), cell('ut-org', '소속'),
                cell('ut-cur', '역할'), cell('ut-chg', '역할 변경'), cell('ut-del', '삭제'));
    tableEl.append(head);
    document.getElementById('user-count').textContent = '총 ' + USERS.length + '명';

    list.forEach(u => {
      const row = el('div', 'ut-row');
      const name = dispNick(u, myNick);

      const uc = el('div', 'ut-user');
      uc.append(el('span', 'ut-avatar', name.charAt(0)), el('span', 'ut-name', name + (u.me ? ' (나)' : '')));

      const cc = el('div', 'ut-cur'); cc.append(roleBadge(u.role));

      const chg = el('div', 'ut-chg');
      const seg = el('div', 'role-seg');
      ['member', 'staff'].forEach(r => {
        const b = el('button', 'rs-btn' + (u.role === r ? ' active' : ''), ROLE_KO[r]);
        if (u.me) b.disabled = true;
        else b.addEventListener('click', () => {
          u.role = r; renderUsers();
          toast(strongNode(name), document.createTextNode(' 역할을 ' + ROLE_KO[r] + '(으)로 변경했어요'));
        });
        seg.append(b);
      });
      chg.append(seg);

      const del = el('div', 'ut-del');
      const delBtn = el('button', 'ut-del-btn');
      delBtn.title = '회원 삭제';
      delBtn.append(icon('trash'));
      if (u.me) { delBtn.disabled = true; delBtn.title = '본인은 삭제할 수 없습니다'; }
      else delBtn.addEventListener('click', () => {
        showConfirm('회원이 삭제됩니다. 삭제하시겠습니까?', () => {
          const i = USERS.indexOf(u);
          if (i > -1) USERS.splice(i, 1);
          renderUsers();
          toast(strongNode(name), document.createTextNode(' 회원을 삭제했어요'));
        });
      });
      del.append(delBtn);

      row.append(uc, cell('ut-email', u.email), cell('ut-org', u.org || '—'), cc, chg, del);
      tableEl.append(row);
    });
  }

  /* ── 삭제 확인 모달 ── */
  const confirmModal = document.getElementById('confirm-modal');
  let _onConfirm = null;
  function showConfirm(msg, onOk) {
    document.getElementById('confirm-msg').textContent = msg;
    _onConfirm = onOk;
    confirmModal.classList.add('show');
  }
  function closeConfirm() { confirmModal.classList.remove('show'); _onConfirm = null; }
  document.getElementById('confirm-cancel').addEventListener('click', closeConfirm);
  document.getElementById('confirm-ok').addEventListener('click', () => { const f = _onConfirm; closeConfirm(); if (f) f(); });
  confirmModal.addEventListener('click', e => { if (e.target === confirmModal) closeConfirm(); });

  /* ── 사용자 추가 모달 ── */
  const addModal = document.getElementById('add-modal');
  const amNick = document.getElementById('am-nick');
  const amEmail = document.getElementById('am-email');
  const amPw = document.getElementById('am-pw');
  const amPw2 = document.getElementById('am-pw2');
  const amRole = document.getElementById('am-role');
  function openAdd() { amNick.value = ''; amEmail.value = ''; amPw.value = ''; amPw2.value = ''; amRole.value = 'member'; addModal.classList.add('show'); amNick.focus(); }
  function closeAdd() { addModal.classList.remove('show'); }
  document.getElementById('add-user-btn').addEventListener('click', openAdd);
  document.getElementById('am-close').addEventListener('click', closeAdd);
  document.getElementById('am-cancel').addEventListener('click', closeAdd);
  addModal.addEventListener('click', e => { if (e.target === addModal) closeAdd(); });
  document.getElementById('am-submit').addEventListener('click', () => {
    const nick = amNick.value.trim();
    const email = amEmail.value.trim();
    const pw = amPw.value;
    const pw2 = amPw2.value;
    if (!nick) { amNick.focus(); toastText('닉네임을 입력해 주세요'); return; }
    if (!email) { amEmail.focus(); toastText('이메일을 입력해 주세요'); return; }
    if (!pw) { amPw.focus(); toastText('비밀번호를 입력해 주세요'); return; }
    if (pw.length < 8) { amPw.focus(); toastText('비밀번호는 8자 이상 입력해 주세요'); return; }
    if (pw !== pw2) { amPw2.focus(); toastText('비밀번호가 일치하지 않습니다'); return; }
    // 시안: 비밀번호는 검증만 하고 저장하지 않음(평문 저장 방지)
    USERS.push({ nick: nick, email: email, org: '', role: amRole.value });
    closeAdd();
    renderUsers();
    toast(strongNode(nick), document.createTextNode(' 회원을 추가했어요'));
  });

  function applyAccess(member) {
    const denied = document.getElementById('admin-denied');
    const content = document.getElementById('admin-content');
    if (!member) { denied.hidden = true; content.hidden = true; return; }   // 비로그인 → 게이트가 덮음
    if (isStaff()) { denied.hidden = true; content.hidden = false; renderUsers(); }
    else { denied.hidden = false; content.hidden = true; }                  // 일반(Member) → 권한 없음
  }

  searchEl.addEventListener('input', renderUsers);
  initChrome((member) => applyAccess(member));
</script>

</body>
</html>
