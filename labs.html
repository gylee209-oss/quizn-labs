<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoftN Labs · 실험실</title>
<link rel="stylesheet" href="./fonts/fontello/css/fontello.css">
<link rel="stylesheet" href="./labs.css">
<!-- FOUC 방지: 테마 즉시 적용 -->
<script>document.documentElement.setAttribute('data-mode', localStorage.getItem('labs_theme') || 'light');</script>
</head>
<body>

<!-- 헤더 (labs.js가 주입) -->
<div id="header-slot"></div>

<!-- 히어로 -->
<section class="hero">
  <div class="inner">
    <div class="left">
      <div class="htitle">
        <h1>Labs</h1>
        <span class="ko-tag">실험실</span>
      </div>
      <p class="desc">현재 진행 중인 프로젝트와 프로토타입에 의견을 남겨주세요.</p>
    </div>
    <div class="count" hidden>총 <strong id="total-count">0</strong>개</div>
  </div>
</section>

<!-- 본문 -->
<main class="container">
  <div class="labs-caution">
    <i class="icon-attention-alt-1 ci"></i>
    <ul>
      <li><strong>정식 출시 전</strong>까지 사용자가 제작한 데이터(설정·평가·댓글 등)는 사전 고지 후 초기화되거나 삭제될 수 있습니다.</li>
      <li>정식 출시가 확정되기 전까지 작성한 데이터의 <strong>보존 및 타 서비스 연계(연동)는 지원하지 않습니다.</strong></li>
    </ul>
  </div>

  <div class="controls">
    <div class="search">
      <i class="icon-zoom-in"></i>
      <input type="text" id="search" placeholder="모델명으로 검색" autocomplete="off">
    </div>
    <div class="filter-chips" id="filter-chips"></div>
    <select class="sort" id="sort">
      <option value="updated">최신 수정순</option>
      <option value="rating">평점 높은순</option>
      <option value="count">평가 많은순</option>
      <option value="name">이름순</option>
    </select>
  </div>

  <div class="section-title">
    <h2>진행 중인 모델</h2>
    <span class="active-count" id="active-count">// 0 active</span>
    <a class="btn primary new-model" id="new-model" href="labs-write.html" hidden>+ 새 모델 등록</a>
  </div>

  <div class="model-grid" id="model-grid"></div>
  <div class="list-pagination" id="card-pagination"></div>
</main>

<!-- 푸터 (labs.js가 주입) -->
<div id="footer-slot"></div>

<!-- 게이트 (labs.js가 주입) -->
<div id="gate-slot"></div>

<script src="./labs.js?v=20260617"></script>
<script>
  // 헤더·게이트 주입
  document.getElementById('header-slot').outerHTML = headerHTML();
  document.getElementById('gate-slot').outerHTML = gateHTML();
  injectFooter('footer-slot');

  const gridEl = document.getElementById('model-grid');
  const searchEl = document.getElementById('search');
  const sortEl = document.getElementById('sort');
  const chipsEl = document.getElementById('filter-chips');

  let activeFilter = 'all';
  let cardPage = 0;
  const PER_PAGE = 8;
  const pagerEl = document.getElementById('card-pagination');

  // 등록된 커스텀 모델 + 기본 모델 병합 (Staff가 등록한 모델이 목록에 표시됨)
  const customModels = (function () { try { return JSON.parse(localStorage.getItem('labs_custom_models') || '[]'); } catch (e) { return []; } })();
  const VIEW_MODELS = customModels.concat(MODELS);

  // 필터 칩 (상태별 카운트)
  const counts = {
    all: VIEW_MODELS.length,
    beta: VIEW_MODELS.filter(m => m.status === 'beta').length,
    live: VIEW_MODELS.filter(m => m.status === 'live').length,
    archived: VIEW_MODELS.filter(m => m.status === 'archived').length
  };
  const CHIP_DEFS = [
    { key: 'all', label: '전체' }, { key: 'beta', label: '베타' },
    { key: 'live', label: '정식' }, { key: 'archived', label: '보관' }
  ];
  CHIP_DEFS.forEach(def => {
    const chip = el('button', 'chip' + (def.key === 'all' ? ' active' : ''));
    chip.append(document.createTextNode(def.label), Object.assign(el('span', 'c-cnt'), { textContent: counts[def.key] }));
    chip.addEventListener('click', () => {
      activeFilter = def.key;
      cardPage = 0;
      chipsEl.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      render();
    });
    chipsEl.append(chip);
  });

  document.getElementById('total-count').textContent = VIEW_MODELS.length;

  function buildCard(m) {
    const card = el('article', 'model-card');
    card.addEventListener('click', () => { location.href = 'labs-detail.html?model=' + m.key; });

    const thumb = el('div', 'mc-thumb');
    thumb.append(
      Object.assign(el('span', 'status-badge ' + m.status), { textContent: STATUS_KO[m.status] }),
      Object.assign(el('span', 'shot-label'), { textContent: 'PRODUCT SHOT' }),
      Object.assign(el('span', 'watermark'), { textContent: m.name.charAt(0) })
    );

    const body = el('div', 'mc-body');
    body.append(el('h3', 'mc-name', m.name), el('p', 'mc-desc', m.desc));

    const foot = el('div', 'mc-foot');
    const rating = el('div', 'rating');
    rating.append(
      Object.assign(el('span', 'star'), { textContent: '★' }),
      Object.assign(el('span', 'score'), { textContent: m.rating.toFixed(2) }),
      Object.assign(el('span', 'rcount'), { textContent: '(' + m.count + ')' })
    );
    const ext = el('span', 'ext');
    ext.append(icon('export'));
    foot.append(rating, ext);

    card.append(thumb, body, foot);
    return card;
  }

  function render() {
    const q = searchEl.value.trim().toLowerCase();
    let list = VIEW_MODELS.filter(m => activeFilter === 'all' || m.status === activeFilter);
    if (q) list = list.filter(m => m.name.toLowerCase().includes(q));

    const sort = sortEl.value;
    list = [...list].sort((a, b) => {
      if (sort === 'updated') return b.updated.localeCompare(a.updated);
      if (sort === 'rating') return b.rating - a.rating;
      if (sort === 'count') return b.count - a.count;
      if (sort === 'name') return a.name.localeCompare(b.name, 'ko');
      return 0;
    });

    // 페이지네이션
    const totalPages = Math.ceil(list.length / PER_PAGE);
    if (cardPage >= totalPages) cardPage = 0;
    const pageItems = list.slice(cardPage * PER_PAGE, cardPage * PER_PAGE + PER_PAGE);

    gridEl.replaceChildren();
    if (list.length === 0) {
      gridEl.append(el('p', 'empty-state', '검색 결과가 없습니다.'));
    } else {
      pageItems.forEach(m => gridEl.append(buildCard(m)));
    }
    renderPager(pagerEl, list.length, PER_PAGE, cardPage, p => { cardPage = p; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); });

    const active = VIEW_MODELS.filter(m => m.status !== 'archived').length;
    document.getElementById('active-count').textContent = '// ' + active + ' active';
  }

  searchEl.addEventListener('input', () => { cardPage = 0; render(); });
  sortEl.addEventListener('change', () => { cardPage = 0; render(); });

  initChrome(() => { const nm = document.getElementById('new-model'); if (nm) nm.hidden = !isStaff(); });
  render();
</script>

</body>
</html>
